name: Candidate verification

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Exact 40-character release candidate SHA to verify"
        required: true

concurrency:
  group: release-candidate-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  verify-candidate:
    name: Verify isolated release candidate
    runs-on: ubuntu-latest
    environment: release-candidate
    timeout-minutes: 45
    env:
      POSTGRES_USER: consultant
      POSTGRES_BIND_ADDRESS: 127.0.0.1
      POSTGRES_HOST_PORT: "25432"
      REDIS_BIND_ADDRESS: 127.0.0.1
      REDIS_HOST_PORT: "26379"
      API_BIND_ADDRESS: 127.0.0.1
      API_HOST_PORT: "28000"
      WEB_BIND_ADDRESS: 127.0.0.1
      WEB_HOST_PORT: "23000"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:28000/api/v1
      REQUESTED_CANDIDATE_SHA: ${{ inputs.ref }}
    steps:
      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Verify exact SHA and main lineage
        shell: bash
        run: |
          set -euo pipefail
          [[ "$REQUESTED_CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          test "$CHECKED_OUT_SHA" = "$REQUESTED_CANDIDATE_SHA"
          git fetch origin main:refs/remotes/origin/main --no-tags
          git merge-base --is-ancestor "$CHECKED_OUT_SHA" origin/main
          test -f infra/docker-compose.candidate.yml
          test -f infra/deploy/validate-candidate-verification.sh
          mkdir -p artifacts
          echo "CANDIDATE_SHA=$CHECKED_OUT_SHA" >> "$GITHUB_ENV"
          printf '%s\n' "$CHECKED_OUT_SHA" | tee artifacts/candidate-sha.txt

      - name: Derive isolated candidate names
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${CANDIDATE_SHA:0:12}"
          PROJECT_NAME="amx_rc_${SHORT_SHA}"
          {
            echo "SHORT_SHA=$SHORT_SHA"
            echo "COMPOSE_PROJECT_NAME=$PROJECT_NAME"
            echo "CANDIDATE_ENV_FILE=$RUNNER_TEMP/.env.rc.${SHORT_SHA}"
            echo "COMPOSE_CONFIG_FILE=$RUNNER_TEMP/candidate-compose-config.${SHORT_SHA}.yml"
            echo "AMX_ENV_FILE=$RUNNER_TEMP/.env.rc.${SHORT_SHA}"
            echo "AMX_CONTAINER_PREFIX=$PROJECT_NAME"
            echo "AMX_RUNTIME_NETWORK=${PROJECT_NAME}_network"
            echo "AMX_POSTGRES_VOLUME=${PROJECT_NAME}_postgres_data"
            echo "AMX_REDIS_VOLUME=${PROJECT_NAME}_redis_data"
            echo "POSTGRES_DB=$PROJECT_NAME"
          } >> "$GITHUB_ENV"

      - name: Generate candidate-only environment
        shell: bash
        env:
          RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL }}
          RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD }}
          RELEASE_CANDIDATE_LLM_API_KEY: ${{ secrets.RELEASE_CANDIDATE_LLM_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL"
          test -n "$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD"
          test -n "$RELEASE_CANDIDATE_LLM_API_KEY"
          GENERATED_POSTGRES_PASSWORD="$(openssl rand -hex 24)"
          GENERATED_JWT_SECRET_KEY="$(openssl rand -hex 32)"
          echo "::add-mask::$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL"
          echo "::add-mask::$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD"
          echo "::add-mask::$RELEASE_CANDIDATE_LLM_API_KEY"
          echo "::add-mask::$GENERATED_POSTGRES_PASSWORD"
          echo "::add-mask::$GENERATED_JWT_SECRET_KEY"
          cat > "$CANDIDATE_ENV_FILE" <<EOF
          ENVIRONMENT=staging
          COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME
          AMX_ENV_FILE=$AMX_ENV_FILE
          AMX_CONTAINER_PREFIX=$AMX_CONTAINER_PREFIX
          AMX_RUNTIME_NETWORK=$AMX_RUNTIME_NETWORK
          AMX_POSTGRES_VOLUME=$AMX_POSTGRES_VOLUME
          AMX_REDIS_VOLUME=$AMX_REDIS_VOLUME
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$GENERATED_POSTGRES_PASSWORD
          DATABASE_URL=postgresql+asyncpg://$POSTGRES_USER:$GENERATED_POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB
          POSTGRES_BIND_ADDRESS=$POSTGRES_BIND_ADDRESS
          POSTGRES_HOST_PORT=$POSTGRES_HOST_PORT
          REDIS_BIND_ADDRESS=$REDIS_BIND_ADDRESS
          REDIS_HOST_PORT=$REDIS_HOST_PORT
          API_BIND_ADDRESS=$API_BIND_ADDRESS
          API_HOST_PORT=$API_HOST_PORT
          WEB_BIND_ADDRESS=$WEB_BIND_ADDRESS
          WEB_HOST_PORT=$WEB_HOST_PORT
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          BOOTSTRAP_ADMIN_EMAIL=$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL
          BOOTSTRAP_ADMIN_PASSWORD=$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD
          AMX_CANDIDATE_LLM_API_KEY=$RELEASE_CANDIDATE_LLM_API_KEY
          AMX_CANDIDATE_GRAPHIFY_READINESS_REF=internal-candidate-graphify-ready
          AMX_CANDIDATE_GITNEXUS_READINESS_REF=internal-candidate-gitnexus-ready
          JWT_SECRET_KEY=$GENERATED_JWT_SECRET_KEY
          EOF
          chmod 600 "$CANDIDATE_ENV_FILE"

      - name: Render and inspect candidate compose config
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            config > "$COMPOSE_CONFIG_FILE"
          bash infra/deploy/validate-candidate-verification.sh \
            --env-file "$CANDIDATE_ENV_FILE" \
            --compose-project-name "$COMPOSE_PROJECT_NAME" \
            --compose-config "$COMPOSE_CONFIG_FILE" \
            | tee artifacts/pre-start-safety.txt
          {
            echo "candidate_sha=$CANDIDATE_SHA"
            echo "compose_project=$COMPOSE_PROJECT_NAME"
            echo "container_prefix=$AMX_CONTAINER_PREFIX"
            echo "network=$AMX_RUNTIME_NETWORK"
            echo "postgres_volume=$AMX_POSTGRES_VOLUME"
            echo "redis_volume=$AMX_REDIS_VOLUME"
            echo "postgres_db=$POSTGRES_DB"
            echo "api_url=http://127.0.0.1:$API_HOST_PORT"
            echo "runtime_started=postgres,redis,api"
            echo "config_isolated_not_runtime_started=worker,web"
            echo "config_assertions=passed"
            echo "raw_compose_config_retained=false"
            echo "raw_env_retained=false"
          } | tee artifacts/candidate-config-summary.txt
          rm -f "$COMPOSE_CONFIG_FILE"

      - name: Start isolated candidate stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            up -d --build postgres redis api
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            ps | tee artifacts/docker-compose-ps.txt

      - name: Verify historical migration compatibility baseline
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "[candidate-migration] gate=historical migration compatibility baseline verification"
            echo "[candidate-migration] baseline_fixture=0021_invitation_delivery plus projects/documents ORM smoke columns"
            echo "[candidate-migration] scope=not a clean empty-database full-history migration proof"
          } | tee artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T postgres psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
            'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE TABLE IF NOT EXISTS projects (
            id uuid PRIMARY KEY DEFAULT uuid_generate_v4(),
            name varchar(255) NOT NULL DEFAULT '"'"'candidate-project'"'"',
            description text,
            slug varchar(100) NOT NULL DEFAULT '"'"'candidate-project'"'"',
            status varchar(20) NOT NULL DEFAULT '"'"'active'"'"',
            owner_id uuid,
            tenant_id uuid,
            created_at timestamp with time zone NOT NULL DEFAULT now(),
            updated_at timestamp with time zone NOT NULL DEFAULT now(),
            deleted_at timestamp with time zone
          );
          CREATE TABLE IF NOT EXISTS documents (
            id uuid PRIMARY KEY DEFAULT uuid_generate_v4(),
            project_id uuid NOT NULL,
            doc_type varchar(50) NOT NULL DEFAULT '"'"'urs'"'"',
            title varchar(500) NOT NULL DEFAULT '"'"'candidate-document'"'"',
            content text NOT NULL DEFAULT '"'"''"'"',
            status varchar(20) NOT NULL DEFAULT '"'"'draft'"'"',
            version integer NOT NULL DEFAULT 1,
            parent_document_id uuid,
            created_by uuid NOT NULL DEFAULT uuid_generate_v4(),
            approved_by uuid,
            quality_score double precision,
            metadata_json jsonb,
            tenant_id uuid,
            created_at timestamp with time zone NOT NULL DEFAULT now(),
            updated_at timestamp with time zone NOT NULL DEFAULT now(),
            deleted_at timestamp with time zone
          );' \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic stamp 0021_invitation_delivery \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic upgrade head \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic downgrade 0021_invitation_delivery \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic upgrade head \
            | tee -a artifacts/migration-verification.txt

      - name: Start candidate API server
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api sh -c \
            'nohup /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 > /proc/1/fd/1 2> /proc/1/fd/2 &'

      - name: Run candidate health check
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            ps | tee artifacts/health-check.txt
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:$API_HOST_PORT/health" | tee -a artifacts/health-check.txt; then
              echo "[candidate-health] healthy" | tee -a artifacts/health-check.txt
              exit 0
            fi
            echo "[candidate-health] attempt $attempt failed; retrying" | tee -a artifacts/health-check.txt
            sleep 3
          done
          exit 1

      - name: Commission candidate provider readiness
        shell: bash
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1090
          source "$CANDIDATE_ENV_FILE"
          set +a
          login_payload="$(
            python3 -c 'import json,os; print(json.dumps({"email": os.environ["BOOTSTRAP_ADMIN_EMAIL"], "password": os.environ["BOOTSTRAP_ADMIN_PASSWORD"]}))'
          )"
          login_response="$(
            curl -fsS \
              -H "Content-Type: application/json" \
              -d "$login_payload" \
              "http://127.0.0.1:$API_HOST_PORT/api/v1/identity/auth/login"
          )"
          ACCESS_TOKEN="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("access_token", ""))' <<<"$login_response")"
          test -n "$ACCESS_TOKEN"
          python3 <<'PY' > "$RUNNER_TEMP/candidate-provider-payloads.jsonl"
          import json

          providers = [
              {
                  "name": "Release LLM Provider",
                  "provider_type": "llm",
                  "config": {
                      "credential_ref": "env:AMX_CANDIDATE_LLM_API_KEY",
                      "base_url": "https://candidate-provider.local/llm",
                      "model": "candidate-release-model",
                      "last_test_status": "healthy",
                  },
                  "capabilities": {"text_generation": True},
              },
              {
                  "name": "Release Graphify Provider",
                  "provider_type": "graphify",
                  "config": {
                      "credential_ref": "env:AMX_CANDIDATE_GRAPHIFY_READINESS_REF",
                      "base_url": "https://candidate-provider.local/graphify",
                      "last_test_status": "healthy",
                  },
                  "capabilities": {"graph_extraction": True},
              },
              {
                  "name": "Release GitNexus Provider",
                  "provider_type": "gitnexus",
                  "config": {
                      "credential_ref": "env:AMX_CANDIDATE_GITNEXUS_READINESS_REF",
                      "base_url": "https://candidate-provider.local/gitnexus",
                      "last_test_status": "healthy",
                  },
                  "capabilities": {"code_index": True},
              },
          ]
          for provider in providers:
              print(json.dumps(provider, separators=(",", ":")))
          PY
          : > artifacts/candidate-provider-readiness.txt
          while IFS= read -r payload; do
            provider_name="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["name"])' "$payload")"
            curl -fsS \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "http://127.0.0.1:$API_HOST_PORT/api/v1/providers" >/dev/null
            echo "[candidate-provider] registered $provider_name" | tee -a artifacts/candidate-provider-readiness.txt
          done < "$RUNNER_TEMP/candidate-provider-payloads.jsonl"
          curl -fsS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "http://127.0.0.1:$API_HOST_PORT/api/v1/providers/readiness" \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); print("[candidate-provider] production_ready={} live_providers={} missing_required_types={}".format(data.get("production_ready"), data.get("live_providers"), data.get("missing_required_types")))' \
            | tee -a artifacts/candidate-provider-readiness.txt

      - name: Activate candidate capability evidence
        shell: bash
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1090
          source "$CANDIDATE_ENV_FILE"
          set +a
          login_payload="$(
            python3 -c 'import json,os; print(json.dumps({"email": os.environ["BOOTSTRAP_ADMIN_EMAIL"], "password": os.environ["BOOTSTRAP_ADMIN_PASSWORD"]}))'
          )"
          login_response="$(
            curl -fsS \
              -H "Content-Type: application/json" \
              -d "$login_payload" \
              "http://127.0.0.1:$API_HOST_PORT/api/v1/identity/auth/login"
          )"
          ACCESS_TOKEN="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("access_token", ""))' <<<"$login_response")"
          test -n "$ACCESS_TOKEN"
          activation_payload='{"dry_run":false,"confirm":true}'
          curl -fsS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$activation_payload" \
            "http://127.0.0.1:$API_HOST_PORT/api/v1/ops/capabilities/activation-run" \
            | tee artifacts/candidate-capability-activation.json \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); after=data.get("readiness_after") or {}; actions=data.get("actions") or []; completed=[item.get("key") for item in actions if item.get("status")=="completed"]; print("[candidate-capability] executed={} production_ready={} completed_actions={}".format(data.get("executed"), after.get("production_ready"), ",".join(completed))); sys.exit(0 if after.get("production_ready") is True else 1)'

      - name: Run candidate authenticated smoke
        shell: bash
        run: |
          set -euo pipefail
          bash infra/deploy/authenticated-smoke.sh \
            --base-url "http://127.0.0.1:$API_HOST_PORT" \
            --env-file "$CANDIDATE_ENV_FILE" \
            | tee artifacts/authenticated-smoke.txt

      - name: Collect sanitized candidate logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "$CANDIDATE_ENV_FILE" ]]; then
            cat > "$RUNNER_TEMP/redact_candidate_logs.py" <<'PY'
          import pathlib
          import sys

          env_path = pathlib.Path(sys.argv[1])
          text = sys.stdin.read()
          for line in env_path.read_text(encoding="utf-8").splitlines():
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              key = key.strip()
              value = value.strip()
              if key in {
                  "POSTGRES_PASSWORD",
                  "DATABASE_URL",
                  "BOOTSTRAP_ADMIN_EMAIL",
                  "BOOTSTRAP_ADMIN_PASSWORD",
                  "AMX_CANDIDATE_LLM_API_KEY",
                  "JWT_SECRET_KEY",
              } and value:
                  text = text.replace(value, f"[REDACTED_{key}]")
          print(text, end="")
          PY
            docker compose \
              -p "$COMPOSE_PROJECT_NAME" \
              -f infra/docker-compose.yml \
              -f infra/docker-compose.candidate.yml \
              --env-file "$CANDIDATE_ENV_FILE" \
              logs --tail=200 2>&1 \
              | python3 "$RUNNER_TEMP/redact_candidate_logs.py" "$CANDIDATE_ENV_FILE" \
              > artifacts/candidate-compose-logs-redacted.txt || true
          else
            echo "candidate env file already removed; no logs collected" > artifacts/candidate-compose-logs-redacted.txt
          fi

      - name: Teardown candidate stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            down -v --remove-orphans || true
          docker ps -a --filter "name=$COMPOSE_PROJECT_NAME" | tee artifacts/post-teardown-containers.txt
          docker network ls --filter "name=$COMPOSE_PROJECT_NAME" | tee artifacts/post-teardown-networks.txt
          docker volume ls --filter "name=$COMPOSE_PROJECT_NAME" | tee artifacts/post-teardown-volumes.txt
          remaining_containers="$(docker ps -aq --filter "name=$COMPOSE_PROJECT_NAME")"
          remaining_networks="$(docker network ls -q --filter "name=$COMPOSE_PROJECT_NAME")"
          remaining_volumes="$(docker volume ls -q --filter "name=$COMPOSE_PROJECT_NAME")"
          rm -f "$CANDIDATE_ENV_FILE" "$COMPOSE_CONFIG_FILE"
          if [[ -n "$remaining_containers$remaining_networks$remaining_volumes" ]]; then
            echo "candidate teardown left resources behind" >&2
            exit 1
          fi

      - name: Upload candidate verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidate-verification-evidence
          path: artifacts
          if-no-files-found: ignore
