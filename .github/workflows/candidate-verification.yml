name: Candidate verification

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Exact 40-character release candidate SHA to verify"
        required: true

concurrency:
  group: release-candidate-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  verify-candidate:
    name: Verify isolated release candidate
    runs-on: ubuntu-latest
    environment: release-candidate
    timeout-minutes: 45
    env:
      POSTGRES_USER: consultant
      POSTGRES_BIND_ADDRESS: 127.0.0.1
      POSTGRES_HOST_PORT: "25432"
      REDIS_BIND_ADDRESS: 127.0.0.1
      REDIS_HOST_PORT: "26379"
      API_BIND_ADDRESS: 127.0.0.1
      API_HOST_PORT: "28000"
      WEB_BIND_ADDRESS: 127.0.0.1
      WEB_HOST_PORT: "23000"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:28000/api/v1
    steps:
      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Verify exact SHA and main lineage
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE_SHA="${{ github.event.inputs.ref }}"
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          git fetch origin main:refs/remotes/origin/main --no-tags
          git merge-base --is-ancestor "$CANDIDATE_SHA" origin/main
          test -f infra/docker-compose.candidate.yml
          test -f infra/deploy/validate-candidate-verification.sh
          mkdir -p artifacts
          git rev-parse HEAD | tee artifacts/candidate-sha.txt

      - name: Derive isolated candidate names
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE_SHA="${{ github.event.inputs.ref }}"
          SHORT_SHA="${CANDIDATE_SHA:0:12}"
          PROJECT_NAME="amx_rc_${SHORT_SHA}"
          {
            echo "SHORT_SHA=$SHORT_SHA"
            echo "COMPOSE_PROJECT_NAME=$PROJECT_NAME"
            echo "CANDIDATE_ENV_FILE=$RUNNER_TEMP/.env.rc.${SHORT_SHA}"
            echo "COMPOSE_CONFIG_FILE=$RUNNER_TEMP/candidate-compose-config.${SHORT_SHA}.yml"
            echo "AMX_ENV_FILE=$RUNNER_TEMP/.env.rc.${SHORT_SHA}"
            echo "AMX_CONTAINER_PREFIX=$PROJECT_NAME"
            echo "AMX_RUNTIME_NETWORK=${PROJECT_NAME}_network"
            echo "AMX_POSTGRES_VOLUME=${PROJECT_NAME}_postgres_data"
            echo "AMX_REDIS_VOLUME=${PROJECT_NAME}_redis_data"
            echo "POSTGRES_DB=$PROJECT_NAME"
          } >> "$GITHUB_ENV"

      - name: Generate candidate-only environment
        shell: bash
        env:
          RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL }}
          RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL"
          test -n "$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD"
          GENERATED_POSTGRES_PASSWORD="$(openssl rand -hex 24)"
          GENERATED_JWT_SECRET_KEY="$(openssl rand -hex 32)"
          echo "::add-mask::$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL"
          echo "::add-mask::$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD"
          echo "::add-mask::$GENERATED_POSTGRES_PASSWORD"
          echo "::add-mask::$GENERATED_JWT_SECRET_KEY"
          cat > "$CANDIDATE_ENV_FILE" <<EOF
          ENVIRONMENT=staging
          COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME
          AMX_ENV_FILE=$AMX_ENV_FILE
          AMX_CONTAINER_PREFIX=$AMX_CONTAINER_PREFIX
          AMX_RUNTIME_NETWORK=$AMX_RUNTIME_NETWORK
          AMX_POSTGRES_VOLUME=$AMX_POSTGRES_VOLUME
          AMX_REDIS_VOLUME=$AMX_REDIS_VOLUME
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$GENERATED_POSTGRES_PASSWORD
          DATABASE_URL=postgresql+asyncpg://$POSTGRES_USER:$GENERATED_POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB
          POSTGRES_BIND_ADDRESS=$POSTGRES_BIND_ADDRESS
          POSTGRES_HOST_PORT=$POSTGRES_HOST_PORT
          REDIS_BIND_ADDRESS=$REDIS_BIND_ADDRESS
          REDIS_HOST_PORT=$REDIS_HOST_PORT
          API_BIND_ADDRESS=$API_BIND_ADDRESS
          API_HOST_PORT=$API_HOST_PORT
          WEB_BIND_ADDRESS=$WEB_BIND_ADDRESS
          WEB_HOST_PORT=$WEB_HOST_PORT
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          BOOTSTRAP_ADMIN_EMAIL=$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_EMAIL
          BOOTSTRAP_ADMIN_PASSWORD=$RELEASE_CANDIDATE_BOOTSTRAP_ADMIN_PASSWORD
          JWT_SECRET_KEY=$GENERATED_JWT_SECRET_KEY
          EOF
          chmod 600 "$CANDIDATE_ENV_FILE"

      - name: Render and inspect candidate compose config
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            config > "$COMPOSE_CONFIG_FILE"
          bash infra/deploy/validate-candidate-verification.sh \
            --env-file "$CANDIDATE_ENV_FILE" \
            --compose-project-name "$COMPOSE_PROJECT_NAME" \
            --compose-config "$COMPOSE_CONFIG_FILE" \
            | tee artifacts/pre-start-safety.txt
          {
            echo "candidate_sha=${{ github.event.inputs.ref }}"
            echo "compose_project=$COMPOSE_PROJECT_NAME"
            echo "container_prefix=$AMX_CONTAINER_PREFIX"
            echo "network=$AMX_RUNTIME_NETWORK"
            echo "postgres_volume=$AMX_POSTGRES_VOLUME"
            echo "redis_volume=$AMX_REDIS_VOLUME"
            echo "postgres_db=$POSTGRES_DB"
            echo "api_url=http://127.0.0.1:$API_HOST_PORT"
            echo "config_assertions=passed"
            echo "raw_compose_config_retained=false"
            echo "raw_env_retained=false"
          } | tee artifacts/candidate-config-summary.txt
          rm -f "$COMPOSE_CONFIG_FILE"

      - name: Start isolated candidate stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            up -d --build
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            ps | tee artifacts/docker-compose-ps.txt

      - name: Verify disposable PostgreSQL migration cycle
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/python -c \
            'import textwrap; exec(textwrap.dedent("""
              import asyncio
              import os

              import asyncpg


              async def main():
                  database_url = os.environ["DATABASE_URL"].replace("postgresql+asyncpg://", "postgresql://", 1)
                  connection = await asyncpg.connect(database_url)
                  try:
                      await connection.execute("CREATE EXTENSION IF NOT EXISTS \\"uuid-ossp\\";")
                      await connection.execute("CREATE EXTENSION IF NOT EXISTS vector;")
                      await connection.execute("CREATE TABLE IF NOT EXISTS projects (id uuid PRIMARY KEY);")
                      await connection.execute("CREATE TABLE IF NOT EXISTS documents (id uuid PRIMARY KEY);")
                  finally:
                      await connection.close()


              asyncio.run(main())
              """))' \
            | tee artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic stamp 0021_invitation_delivery \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic upgrade head \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic downgrade 0021_invitation_delivery \
            | tee -a artifacts/migration-verification.txt
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            exec -T api /app/.venv/bin/alembic upgrade head \
            | tee -a artifacts/migration-verification.txt

      - name: Run candidate health check
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            ps | tee artifacts/health-check.txt
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:$API_HOST_PORT/health" | tee -a artifacts/health-check.txt; then
              echo "[candidate-health] healthy" | tee -a artifacts/health-check.txt
              exit 0
            fi
            echo "[candidate-health] attempt $attempt failed; retrying" | tee -a artifacts/health-check.txt
            sleep 3
          done
          exit 1

      - name: Run candidate authenticated smoke
        shell: bash
        run: |
          set -euo pipefail
          bash infra/deploy/authenticated-smoke.sh \
            --base-url "http://127.0.0.1:$API_HOST_PORT" \
            --env-file "$CANDIDATE_ENV_FILE" \
            | tee artifacts/authenticated-smoke.txt

      - name: Collect sanitized candidate logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "$CANDIDATE_ENV_FILE" ]]; then
            cat > "$RUNNER_TEMP/redact_candidate_logs.py" <<'PY'
          import pathlib
          import sys

          env_path = pathlib.Path(sys.argv[1])
          text = sys.stdin.read()
          for line in env_path.read_text(encoding="utf-8").splitlines():
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              key = key.strip()
              value = value.strip()
              if key in {
                  "POSTGRES_PASSWORD",
                  "DATABASE_URL",
                  "BOOTSTRAP_ADMIN_EMAIL",
                  "BOOTSTRAP_ADMIN_PASSWORD",
                  "JWT_SECRET_KEY",
              } and value:
                  text = text.replace(value, f"[REDACTED_{key}]")
          print(text, end="")
          PY
            docker compose \
              -p "$COMPOSE_PROJECT_NAME" \
              -f infra/docker-compose.yml \
              -f infra/docker-compose.candidate.yml \
              --env-file "$CANDIDATE_ENV_FILE" \
              logs --tail=200 2>&1 \
              | python3 "$RUNNER_TEMP/redact_candidate_logs.py" "$CANDIDATE_ENV_FILE" \
              > artifacts/candidate-compose-logs-redacted.txt || true
          else
            echo "candidate env file already removed; no logs collected" > artifacts/candidate-compose-logs-redacted.txt
          fi

      - name: Teardown candidate stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -p "$COMPOSE_PROJECT_NAME" \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.candidate.yml \
            --env-file "$CANDIDATE_ENV_FILE" \
            down -v --remove-orphans || true
          docker ps -a --filter "name=$COMPOSE_PROJECT_NAME" | tee artifacts/post-teardown-containers.txt
          docker network ls --filter "name=$COMPOSE_PROJECT_NAME" | tee artifacts/post-teardown-networks.txt
          docker volume ls --filter "name=$COMPOSE_PROJECT_NAME" | tee artifacts/post-teardown-volumes.txt
          remaining_containers="$(docker ps -aq --filter "name=$COMPOSE_PROJECT_NAME")"
          remaining_networks="$(docker network ls -q --filter "name=$COMPOSE_PROJECT_NAME")"
          remaining_volumes="$(docker volume ls -q --filter "name=$COMPOSE_PROJECT_NAME")"
          rm -f "$CANDIDATE_ENV_FILE" "$COMPOSE_CONFIG_FILE"
          if [[ -n "$remaining_containers$remaining_networks$remaining_volumes" ]]; then
            echo "candidate teardown left resources behind" >&2
            exit 1
          fi

      - name: Upload candidate verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidate-verification-evidence
          path: artifacts
          if-no-files-found: ignore
