name: CI

permissions:
  contents: read

on:
  workflow_call:
  pull_request:
    branches:
      - main
      - "feature/**"
      - "release/**"
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "infra/**"
      - "release/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: amx_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d amx_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: uv sync --frozen --extra dev

      - name: Audit API dependencies
        run: uv run --extra dev pip-audit

      - name: Verify PostgreSQL Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/amx_ci
        run: |
          uv run python - <<'PY'
          import asyncio

          import asyncpg


          async def main() -> None:
              connection = await asyncpg.connect("postgresql://postgres:postgres@localhost:5432/amx_ci")
              try:
                  await connection.execute('CREATE EXTENSION IF NOT EXISTS "uuid-ossp";')
                  await connection.execute("CREATE EXTENSION IF NOT EXISTS vector;")
                  await connection.execute("CREATE TABLE IF NOT EXISTS projects (id uuid PRIMARY KEY);")
                  await connection.execute("CREATE TABLE IF NOT EXISTS documents (id uuid PRIMARY KEY);")
              finally:
                  await connection.close()


          asyncio.run(main())
          PY
          uv run alembic stamp 0021_invitation_delivery
          uv run alembic upgrade head
          uv run alembic downgrade 0021_invitation_delivery
          uv run alembic upgrade head

      - name: Run API tests
        env:
          JWT_SECRET_KEY: ci-jwt-secret-for-tests
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
          REDIS_URL: redis://localhost:6379/0
          ARQ_REDIS_URL: redis://localhost:6379/1
        run: uv run pytest

  web-build:
    name: Web typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Web production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Typecheck
        run: pnpm typecheck

      - name: Production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:18000/api/v1
        run: pnpm build

  web-e2e:
    name: Web deterministic E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run deterministic E2E
        run: pnpm exec playwright test tests/e2e/playwright/deterministic-regression.spec.ts

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

  docker-compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI compose environment
        run: |
          cp infra/env.example .env
          sed -i 's/^BOOTSTRAP_ADMIN_PASSWORD=.*/BOOTSTRAP_ADMIN_PASSWORD=ci-bootstrap-admin-password/' .env
          sed -i 's/^JWT_SECRET_KEY=.*/JWT_SECRET_KEY=ci-production-jwt-secret-at-least-32-bytes/' .env

      - name: Validate production runtime security preflight
        run: |
          chmod 600 .env
          bash infra/deploy/validate-runtime-security.sh --environment production

      - name: Validate compose file
        run: docker compose -f infra/docker-compose.yml config

      - name: Validate GitNexus compose file
        run: |
          cp infra/gitnexus/env.example infra/gitnexus/.env
          docker compose -f infra/gitnexus/docker-compose.yml --env-file infra/gitnexus/.env config

      - name: Validate deployment scripts
        run: bash -n infra/deploy/*.sh
